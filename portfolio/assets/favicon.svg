<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0A1628"/>
  <!-- gear ring representing manufacturing -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#E2793D" stroke-width="3"/>
  <g fill="#E2793D">
    <rect x="29.5" y="10" width="5" height="7" rx="1.5"/>
    <rect x="29.5" y="47" width="5" height="7" rx="1.5"/>
    <rect x="10" y="29.5" width="7" height="5" rx="1.5"/>
    <rect x="47" y="29.5" width="7" height="5" rx="1.5"/>
  </g>
  <!-- data bars representing analytics, nested inside the gear -->
  <g fill="#F4F6F9">
    <rect x="24" y="30" width="4" height="10" rx="1"/>
    <rect x="30" y="24" width="4" height="16" rx="1"/>
    <rect x="36" y="27" width="4" height="13" rx="1"/>
  </g>
</svg>
